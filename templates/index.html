{% extends "layout.html" %}
{% block container %}

<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="glass-panel p-10 md:p-20 rounded-[3rem] text-center w-full max-w-4xl border-4 border-[#471E15] bg-black/50 backdrop-blur-md shadow-2xl flex flex-col items-center justify-center">
        
        <h1 class="text-5xl md:text-8xl font-black uppercase font-spongebob-yellow mb-8 tracking-tighter pr-4">
            ¡Bienvenido!
        </h1>

        <p class="text-2xl md:text-3xl font-bold font-spongebob-yellow opacity-95 leading-tight tracking-tight max-w-2xl">
            "La pizza de Don Cangrejo <br> 
            ¡es la mejor para ti y para mí!"
        </p>

        <div class="mt-10">
            <div class="h-1.5 w-32 bg-yellow-400 rounded-full shadow-[0_0_20px_rgba(243,224,59,0.8)]"></div>
        </div>

    </div>
</div>

<style>
    .glass-panel {
        margin: auto;
    }

    .font-spongebob-yellow {
        paint-order: stroke fill;
        filter: drop-shadow(6px 6px 0px rgba(0,0,0,1));
        line-height: 1.1;
    }
</style>

{% endblock %}
